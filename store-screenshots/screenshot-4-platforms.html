<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=800">
  <title>IronCV Extension - Supported Platforms</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .container {
      text-align: center;
      max-width: 1000px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.4);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #a78bfa;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 20px;
      color: white;
    }
    h1 span {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 20px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 50px;
    }
    .platforms {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 50px;
    }
    .platform {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 50px;
      transition: all 0.3s;
    }
    .platform:hover {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.1);
      transform: translateY(-5px);
    }
    .platform-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .linkedin-logo {
      background: #0a66c2;
    }
    .indeed-logo {
      background: #2164f3;
    }
    .glassdoor-logo {
      background: #0caa41;
    }
    .platform-logo svg {
      width: 48px;
      height: 48px;
      fill: white;
    }
    .platform-name {
      font-size: 22px;
      font-weight: 600;
      color: white;
      margin-bottom: 6px;
    }
    .platform-desc {
      font-size: 14px;
      color: #94a3b8;
    }
    .cta-section {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .cta-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
    }
    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124, 58, 237, 0.5);
    }
    .cta-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .cta-secondary:hover {
      background: rgba(255,255,255,0.15);
    }
    .check-list {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 14px;
    }
    .check-icon {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🌐 Works Everywhere</div>
    <h1>One Extension. <span>Three Platforms.</span></h1>
    <p class="subtitle">IronCV works seamlessly on all major job boards. No switching tools.</p>
    
    <div class="platforms">
      <div class="platform">
        <div class="platform-logo linkedin-logo">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        </div>
        <div class="platform-name">LinkedIn</div>
        <div class="platform-desc">Jobs & Easy Apply</div>
      </div>
      
      <div class="platform">
        <div class="platform-logo indeed-logo">
          <svg viewBox="0 0 24 24"><path d="M11.566 21.563v-8.762c.356.063.725.094 1.1.094 1.419 0 2.744-.394 3.756-1.131v9.799c0 .781-.631 1.437-1.481 1.437-.788 0-1.444-.656-1.444-1.437zm4.856-14.938c0 2.169-1.756 3.925-3.925 3.925s-3.925-1.756-3.925-3.925 1.756-3.925 3.925-3.925c2.169 0 3.925 1.756 3.925 3.925z"/></svg>
        </div>
        <div class="platform-name">Indeed</div>
        <div class="platform-desc">Jobs & Applications</div>
      </div>
      
      <div class="platform">
        <div class="platform-logo glassdoor-logo">
          <svg viewBox="0 0 24 24"><path d="M17.14 2H6.86A2.86 2.86 0 0 0 4 4.86v14.28A2.86 2.86 0 0 0 6.86 22h10.28A2.86 2.86 0 0 0 20 19.14V4.86A2.86 2.86 0 0 0 17.14 2zM8 19.5a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1zm0-4a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1zm0-4a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v1zm10 4a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v1zm0-4a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 .5.5v1z"/></svg>
        </div>
        <div class="platform-name">Glassdoor</div>
        <div class="platform-desc">Jobs & Reviews</div>
      </div>
    </div>
    
    <div class="cta-section">
      <a href="#" class="cta-btn cta-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm0 22c-5.5 0-10-4.5-10-10S6.5 2 12 2s10 4.5 10 10-4.5 10-10 10z"/><path d="M12 6c-.6 0-1 .4-1 1v5c0 .3.1.5.3.7l3 3c.2.2.5.3.7.3s.5-.1.7-.3c.4-.4.4-1 0-1.4L13 11.6V7c0-.6-.4-1-1-1z"/></svg>
        Install Free Extension
      </a>
      <a href="#" class="cta-btn cta-secondary">
        Learn More →
      </a>
    </div>
    
    <div class="check-list">
      <div class="check-item">
        <span class="check-icon">✓</span>
        100% Free to Use
      </div>
      <div class="check-item">
        <span class="check-icon">✓</span>
        No Sign-up Required
      </div>
      <div class="check-item">
        <span class="check-icon">✓</span>
        Works Instantly
      </div>
    </div>
  </div>
</body>
</html>
